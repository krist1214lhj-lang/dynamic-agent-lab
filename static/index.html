<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ONE'S OWN | AI Travel Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>
      :root {
        --bg: #ffffff;
        --panel: rgba(255, 255, 255, 0.9);
        --text: #111111;
        --muted: #94a3b8;
        --line: rgba(0, 0, 0, 0.05);
        --accent: #000000;
        --card-bg: #ffffff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
      body {
        background: var(--bg);
        background-image: 
          radial-gradient(at 0% 0%, #f0f7ff 0px, transparent 40%),
          radial-gradient(at 100% 0%, #fff1f1 0px, transparent 40%);
        color: var(--text);
        font-family: "Pretendard Variable", -apple-system, sans-serif;
        min-height: 100vh;
        letter-spacing: -0.05em;
        line-height: 1.6;
      }
      main.app-shell {
        width: min(1100px, calc(100% - 40px));
        margin: 0 auto;
        padding: 50px 0;
        display: grid;
        gap: 30px;
      }
      .auth-nav { position: absolute; top: 30px; right: 40px; display: flex; gap: 15px; align-items: center; z-index: 100; }
      .user-info { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
      .nav-btn { background: transparent; border: 1px solid var(--line); padding: 8px 20px; border-radius: 99px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; }
      .nav-btn:hover { border-color: #000; background: #fafafa; }
      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; place-items: center; z-index: 1000; backdrop-filter: blur(10px); }
      .modal-content { background: #fff; width: min(400px, 90%); padding: 50px; border-radius: 40px; border: 1px solid var(--line); box-shadow: 0 30px 60px rgba(0,0,0,0.05); text-align: center; }
      .modal-content h3 { font-size: 2rem; font-weight: 100; text-transform: uppercase; margin-bottom: 30px; }
      .auth-form { display: grid; gap: 15px; }
      .auth-form input { padding: 18px 25px; border-radius: 20px; border: 1px solid var(--line); font-family: inherit; font-size: 1rem; }
      .auth-btn { background: #000; color: #fff; border: 0; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: transform 0.3s; }
      .auth-btn:hover { transform: translateY(-2px); }
      .auth-toggle { margin-top: 25px; font-size: 0.85rem; color: var(--muted); cursor: pointer; text-decoration: underline; }
      .hero-section { text-align: left; margin-bottom: 0px; }
      .hero-section h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 100; color: var(--accent); text-transform: uppercase; line-height: 0.8; letter-spacing: -0.07em; }
      .hero-subtitle { color: var(--muted); font-size: 1.15rem; font-weight: 300; margin-top: 25px; max-width: 550px; line-height: 1.5; }
      .control-panel { background: transparent; padding: 0; }
      .search-bar-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; margin-bottom: 20px; }
      .search-field { display: flex; flex-direction: column; gap: 8px; color: var(--accent); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; }
      .search-field input[type="date"], .search-field select { background: #fff; border: 1px solid var(--line); color: var(--accent); padding: 14px 18px; border-radius: 18px; font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: all 0.4s; font-weight: 400; }
      .search-field input[type="date"]:hover, .search-field select:hover { border-color: #000; }
      button#run-button { background: var(--accent); color: #fff; border: 0; height: 56px; padding: 0 40px; border-radius: 999px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); letter-spacing: 0.1em; }
      button#run-button:hover { transform: scale(1.02) translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
      .additional-conditions-row { margin-top: 35px; border-top: 1px solid var(--line); padding-top: 25px; }
      .tab-header { display: flex; gap: 10px; margin-bottom: 20px; }
      .tab-btn { background: #fff; border: 1px solid var(--line); padding: 8px 24px; border-radius: 999px; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; color: var(--muted); }
      .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .tab-content { display: none; margin-top: 15px; }
      .tab-content.active { display: flex; flex-wrap: wrap; gap: 10px; }
      .checkbox-grid label { background: #fff; border: 1px solid var(--line); padding: 10px 24px; border-radius: 999px; cursor: pointer; font-weight: 400; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--muted); transition: all 0.3s ease; }
      .checkbox-grid label:hover { border-color: #000; color: #000; }
      .checkbox-grid label:has(input:checked) { background: var(--accent); color: #fff; border-color: var(--accent); }
      .checkbox-grid input { display: none; }
      .extra-request-row { margin-top: 25px; }
      textarea#user-request { width: 100%; min-height: 80px; padding: 25px; border-radius: 25px; border: 1px solid var(--line); background: #fff; font-family: inherit; font-size: 1.05rem; font-weight: 300; resize: none; transition: all 0.4s; text-align: left; }
      textarea#user-request:focus { outline: none; border-color: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
      textarea#user-request::placeholder { color: #eee; }
      .result-view { display: grid; gap: 40px; margin-top: 50px; }
      .result-card { background: transparent; border: 0; padding: 0; margin-bottom: 80px; }
      .result-card h2 { font-size: 2.4rem; font-weight: 100; margin-bottom: 15px; text-transform: uppercase; letter-spacing: -0.05em; color: var(--accent); }
      .summary-text { color: var(--text); font-size: 1.15rem; font-weight: 400; margin-bottom: 25px; line-height: 1.4; border-left: 2px solid var(--accent); padding-left: 20px; }
      .details-accordion { margin-top: 20px; border-radius: 20px; background: #fff; border: 1px solid var(--line); overflow: hidden; }
      .details-accordion summary { padding: 18px 25px; font-weight: 600; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; background: #fbfbfb; font-size: 0.95rem; color: var(--text); }
      .details-accordion summary::after { content: "+ 상세보기"; font-size: 0.6rem; font-weight: 900; opacity: 0.3; letter-spacing: 0.2em; }
      .details-accordion[open] summary::after { content: "- 닫기"; }
      .details-content { padding: 30px; }
      .circle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
      .circle-item { text-align: center; }
      .circle-mask { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 1px solid var(--line); background: #fafafa; padding: 6px; margin: 0 auto 15px; transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
      .circle-item:hover .circle-mask { transform: scale(1.05) rotate(-2deg); }
      .circle-mask img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
      .item-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .item-meta { font-size: 0.85rem; color: var(--muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .itinerary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; align-items: start; }
      .day-card { background: #fff; border: 1px solid var(--line); border-radius: 35px; overflow: hidden; transition: transform 0.3s; }
      .day-card:hover { transform: translateY(-5px); border-color: #000; }
      .day-card-header { padding: 25px; background: #fbfbfb; border-bottom: 1px solid var(--line); text-align: center; }
      .day-card-header h3 { font-size: 1.8rem; font-weight: 100; text-transform: uppercase; }
      .day-card-header p { font-size: 0.9rem; color: var(--muted); font-weight: 300; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .day-accordion { border: 0 !important; border-radius: 0 !important; background: transparent !important; }
      .day-accordion summary { padding: 15px 25px; font-size: 0.85rem; font-weight: 700; background: #fff; color: #000; letter-spacing: 0.05em; }
      .day-accordion summary::after { content: "+ 일정보기"; opacity: 0.4; }
      .day-accordion[open] summary::after { content: "- 닫기"; }
      .day-accordion .details-content { padding: 25px; border-top: 1px solid var(--line); }
      .timeline-list { display: grid; gap: 20px; position: relative; padding-left: 45px; }
      .timeline-list::before { content: ""; position: absolute; left: 16px; top: 0; bottom: 0; width: 1px; background: #eee; }
      .timeline-icon { position: absolute; left: -45px; top: 5px; width: 32px; height: 32px; background: #fff; border: 1px solid #eee; border-radius: 50%; display: grid; place-items: center; font-size: 0.65rem; font-weight: 900; color: #ddd; z-index: 1; }
      .timeline-block { background: #fff; padding: 25px; border-radius: 25px; border: 1px solid var(--line); transition: transform 0.4s; }
      .timeline-block strong { display: block; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
      .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
      .info-box { padding: 25px; background: #fff; border-radius: 25px; border: 1px solid var(--line); text-align: center; }
      .info-label { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.1em; }
      .info-value { font-size: 1.25rem; font-weight: 400; color: var(--accent); overflow: hidden; text-overflow: ellipsis; }
      .feedback-section { margin-top: 150px; padding-top: 60px; border-top: 1px solid var(--line); }
      .feedback-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px; text-align: left; }
      .rating-box { padding: 40px; background: #fafafa; border-radius: 35px; border: 1px solid var(--line); }
      .archive-section { margin-top: 200px; padding-top: 60px; border-top: 1px solid var(--line); text-align: center; opacity: 0.4; transition: opacity 0.5s; }
      .archive-section:hover { opacity: 1; }
      .loading-container { display: flex; flex-direction: column; align-items: center; padding: 150px 0; gap: 40px; }
      .spinner { width: 70px; height: 70px; border: 1px solid #eee; border-top: 1px solid #000; border-radius: 50%; animation: spin 1.8s cubic-bezier(0.6, 0, 0.4, 1) infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .hidden { display: none !important; }
      .plan-controls { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
      .control-btn { background: transparent; border: 0; font-size: 0.75rem; font-weight: 800; cursor: pointer; opacity: 0.4; transition: 0.3s; }
      .control-btn:hover { opacity: 1; }
      .control-btn.edit { color: #2b6cb0; }
      .control-btn.delete { color: #e53e3e; }
      .customized-label { font-size: 0.6rem; vertical-align: middle; margin-left: 15px; padding: 4px 12px; background: #000; color: #fff; border-radius: 99px; font-weight: 700; letter-spacing: 0.1em; }
    </style>
  </head>
  <body>
    <nav class="auth-nav" id="auth-nav"></nav>
    <div class="modal-overlay" id="auth-modal">
      <div class="modal-content">
        <h3 id="auth-title">환영합니다</h3>
        <div class="auth-form" id="auth-container">
          <input type="email" id="auth-email" placeholder="이메일 주소" />
          <input type="password" id="auth-password" placeholder="비밀번호" />
          <button type="button" class="auth-btn" id="auth-submit-btn">로그인</button>
        </div>
        <p class="auth-toggle" id="auth-toggle-mode">계정이 없으신가요? 회원가입하기</p>
      </div>
    </div>
    <main class="app-shell">
      <section class="hero-section">
        <p style="font-weight: 900; font-size: 0.7rem; letter-spacing: 0.3em; opacity: 0.3; margin-bottom: 20px;">01. 여행 아키텍처</p>
        <h1>ONE'S OWN<br/>Travel Lab</h1>
        <p class="hero-subtitle">데이터의 정교함과 당신의 고유한 감각이 만나는 지점. 가장 맑은 시선으로 여정을 그립니다.</p>
      </section>
      <section class="control-panel">
        <div class="search-bar-row">
          <label class="search-field">어디로 떠날까요?
            <select id="destination-select">
              <optgroup label="국내 여행">
                <option value="서울">서울</option><option value="부산" selected>부산</option><option value="제주">제주</option>
                <option value="강릉">강릉</option><option value="전주">전주</option><option value="대구">대구</option>
                <option value="대전">대전</option><option value="광주">광주</option><option value="인천">인천</option>
                <option value="여수">여수</option><option value="경주">경주</option><option value="속초">속초</option><option value="춘천">춘천</option>
              </optgroup>
            </select>
          </label>
          <label class="search-field">시작하는 곳
            <select id="origin-select">
              <option value="서울" selected>서울</option><option value="부산">부산</option><option value="대구">대구</option>
              <option value="대전">대전</option><option value="광주">광주</option><option value="인천">인천</option>
            </select>
          </label>
          <label class="search-field">가는 날 <input type="date" id="start-date" /></label>
          <label class="search-field">오는 날 <input type="date" id="end-date" /></label>
          <label class="search-field">여유의 정도
            <select id="budget-select">
              <option value="low">알뜰하게</option><option value="medium" selected>적당하게</option><option value="high">넉넉하게</option>
            </select>
          </label>
          <button id="run-button" type="button">여정 그리기</button>
        </div>
        <div class="options-row">
          <p class="search-field">포함할 정보</p>
          <div class="checkbox-grid" style="display: flex; flex-wrap: wrap; gap: 10px; width: 100%;">
            <label><input type="checkbox" name="feature" value="destination" checked />여행지</label>
            <label><input type="checkbox" name="feature" value="budget" checked />예산</label>
            <label><input type="checkbox" name="feature" value="food" checked />맛집</label>
            <label><input type="checkbox" name="feature" value="event" checked />행사</label>
            <label><input type="checkbox" name="feature" value="schedule" checked />일정</label>
            <label><input type="checkbox" name="feature" value="weather" checked />날씨</label>
            <label><input type="checkbox" name="feature" value="tour" checked />관광지</label>
            <label><input type="checkbox" name="feature" value="transport" checked />교통</label>
            <label><input type="checkbox" name="feature" value="lodging" checked />숙박</label>
          </div>
        </div>
        <div class="additional-conditions-row">
          <p class="search-field">여행 추가 조건</p>
          <div class="tab-container">
            <div class="tab-header">
              <button class="tab-btn active" data-tab="companion">동행인</button>
              <button class="tab-btn" data-tab="theme">여행 테마</button>
              <button class="tab-btn" data-tab="priority">우선순위</button>
            </div>
            <div class="tab-content checkbox-grid active" id="tab-companion">
              <label><input type="checkbox" name="companion" value="alone" />나홀로</label>
              <label><input type="checkbox" name="companion" value="couple" />커플/부부</label>
              <label><input type="checkbox" name="companion" value="family" />아이와 함께</label>
              <label><input type="checkbox" name="companion" value="parents" />부모님과 함께</label>
              <label><input type="checkbox" name="companion" value="friends" />친구와 함께</label>
            </div>
            <div class="tab-content checkbox-grid" id="tab-theme">
              <label><input type="checkbox" name="theme" value="healing" />힐링/휴식</label>
              <label><input type="checkbox" name="theme" value="activity" />액티비티</label>
              <label><input type="checkbox" name="theme" value="foodie" />맛집탐방</label>
              <label><input type="checkbox" name="theme" value="photo" />인생샷/SNS</label>
              <label><input type="checkbox" name="theme" value="culture" />역사/문화</label>
            </div>
            <div class="tab-content checkbox-grid" id="tab-priority">
              <label><input type="radio" name="priority" value="cost" />가성비 중시</label>
              <label><input type="radio" name="priority" value="quality" />퀄리티 중시</label>
              <label><input type="radio" name="priority" value="distance" />이동 최소화</label>
              <label><input type="radio" name="priority" value="popularity" />인기 명소 위주</label>
            </div>
          </div>
        </div>
        <div class="extra-request-row">
          <p class="search-field">특별한 취향</p>
          <textarea id="user-request" placeholder="예: '조용한 북카페 위주로', '생선 요리 못 먹어요'"></textarea>
        </div>
      </section>
      <section class="result-view" id="result"></section>
      <section class="feedback-section">
        <div class="feedback-grid">
          <div class="rating-box">
            <p style="font-weight:900; font-size:0.7rem; letter-spacing:0.3em; margin-bottom:15px; opacity:0.3;">서비스 평가</p>
            <h3 style="font-size:1.8rem; font-weight:100; margin-bottom:10px;">사용 경험이 어떠셨나요?</h3>
            <div class="rating-stars" id="rating-stars">
              <button class="star-btn" data-value="1">○</button>
              <button class="star-btn" data-value="2">○</button>
              <button class="star-btn" data-value="3">○</button>
              <button class="star-btn" data-value="4">○</button>
              <button class="star-btn" data-value="5">○</button>
            </div>
            <div class="input-group">
              <textarea id="rating-comment" placeholder="의견 한마디" style="min-height:60px; width:100%; padding:12px; border:1px solid #eee; border-radius:12px; margin-top:10px;"></textarea>
              <button class="feedback-btn" id="submit-rating" style="background:#000; color:#fff; border:0; padding:10px 25px; border-radius:15px; font-weight:700; cursor:pointer; margin-top:10px;">제출</button>
            </div>
            <div id="average-rating" style="margin-top:40px; border-top:1px solid var(--line); padding-top:20px; font-size:0.85rem; font-weight:700;">평균 별점: 로딩 중...</div>
          </div>
          <div class="comments-box">
            <p style="font-weight:900; font-size:0.7rem; letter-spacing:0.3em; margin-bottom:15px; opacity:0.3;">커뮤니티 댓글</p>
            <div class="input-group" style="background:#fff; padding:30px; border-radius:30px; border:1px solid var(--line); margin-bottom:40px;">
              <input type="text" id="comment-user" placeholder="이름" style="width:100%; padding:12px; border:1px solid #eee; border-radius:12px; margin-bottom:10px;" />
              <textarea id="comment-content" placeholder="댓글을 남겨주세요." style="width:100%; min-height:100px; padding:12px; border:1px solid #eee; border-radius:12px; margin-bottom:10px;"></textarea>
              <button class="feedback-btn" id="submit-comment" style="background:#000; color:#fff; border:0; padding:12px 30px; border-radius:15px; font-weight:700; cursor:pointer;">작성</button>
            </div>
            <div id="comment-list"></div>
          </div>
        </div>
      </section>
      <section class="archive-section" id="recommend-section">
        <p style="font-weight: 900; font-size: 0.7rem; letter-spacing: 0.4em; margin-bottom: 30px;">예산으로 여행 찾기</p>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:15px; max-width:760px; margin:0 auto 25px;">
          <input id="rec-budget" type="number" placeholder="총 예산(원)" style="padding:14px; border-radius:14px; border:1px solid var(--line);" />
          <input id="rec-people" type="number" placeholder="인원수" min="1" value="2" style="padding:14px; border-radius:14px; border:1px solid var(--line);" />
          <input id="rec-days" type="number" placeholder="여행일수(일)" min="1" value="3" style="padding:14px; border-radius:14px; border:1px solid var(--line);" />
        </div>
        <div id="rec-themes" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:25px;">
          <label><input type="checkbox" name="rec-theme" value="healing" /> 힐링</label>
          <label><input type="checkbox" name="rec-theme" value="activity" /> 액티비티</label>
          <label><input type="checkbox" name="rec-theme" value="foodie" /> 미식</label>
          <label><input type="checkbox" name="rec-theme" value="photo" /> 사진</label>
          <label><input type="checkbox" name="rec-theme" value="culture" /> 문화</label>
        </div>
        <div style="text-align:center;"><button id="rec-button" class="nav-btn" style="height:50px; padding:0 35px;">추천받기</button></div>
        <div id="rec-result"></div>
      </section>
      <section class="archive-section">
        <p style="font-weight: 900; font-size: 0.7rem; letter-spacing: 0.4em; margin-bottom: 30px;">저장된 여정 보관함</p>
        <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 50px;">
          <button id="save-plan-button" class="nav-btn" style="height:50px; padding:0 35px;">이 여정 저장하기</button>
          <button id="toggle-saved-plans-button" class="nav-btn" style="height:50px; padding:0 35px;">보관함 열기</button>
        </div>
        <div id="saved-plan-list"></div>
      </section>
    </main>
    <script>
      let currentUser = null; let authMode = "login"; let currentWorkflowResult = null; let savedPlansExpanded = false;
      document.addEventListener("DOMContentLoaded", () => {
        const storedUser = localStorage.getItem("onesown_user");
        if (storedUser) currentUser = JSON.parse(storedUser);
        updateAuthUI(); initAuthLogic(); initTabs(); initRating(); loadComments(); loadRatings();
        const today = new Date(); const next = new Date(); next.setDate(today.getDate() + 2);
        document.querySelector("#start-date").value = today.toISOString().split('T')[0];
        document.querySelector("#end-date").value = next.toISOString().split('T')[0];
      });
      function updateAuthUI() {
        const authNav = document.querySelector("#auth-nav");
        if (currentUser) {
          authNav.innerHTML = `<span class="user-info">${currentUser.email}</span><button class="nav-btn" id="logout-btn">로그아웃</button>`;
          document.querySelector("#logout-btn").addEventListener("click", () => { currentUser = null; localStorage.removeItem("onesown_user"); localStorage.removeItem("onesown_token"); updateAuthUI(); alert("로그아웃 되었습니다."); });
          document.querySelector("#auth-modal").style.display = "none";
        } else {
          authNav.innerHTML = `<button class="nav-btn" id="open-auth-btn">회원가입 및 로그인</button>`;
          document.querySelector("#open-auth-btn").addEventListener("click", () => document.querySelector("#auth-modal").style.display = "grid");
        }
        if (savedPlansExpanded) renderSavedPlans();
      }
      function initAuthLogic() {
        const modal = document.querySelector("#auth-modal"); const submitBtn = document.querySelector("#auth-submit-btn"); const toggleBtn = document.querySelector("#auth-toggle-mode");
        modal.addEventListener("click", (e) => { if (e.target === modal) modal.style.display = "none"; });
        toggleBtn.addEventListener("click", (e) => {
          e.preventDefault(); authMode = authMode === "login" ? "signup" : "login";
          document.querySelector("#auth-title").textContent = authMode === "login" ? "환영합니다" : "회원가입";
          submitBtn.textContent = authMode === "login" ? "로그인" : "계정 생성";
          toggleBtn.textContent = authMode === "login" ? "계정이 없으신가요? 회원가입하기" : "이미 계정이 있으신가요? 로그인하기";
        });
        submitBtn.addEventListener("click", async () => {
          const email = document.querySelector("#auth-email").value; const password = document.querySelector("#auth-password").value;
          if (!email || !password) return alert("정보 입력!");
          try {
            const endpoint = authMode === "login" ? "/auth/login" : "/auth/signup";
            const resp = await fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || "인증 실패");
            if (authMode === "login") {
              currentUser = data.user; localStorage.setItem("onesown_user", JSON.stringify(currentUser));
              localStorage.setItem("onesown_token", data.access_token || "");
              updateAuthUI(); alert(`${currentUser.email}님 환영합니다!`);
            } else { alert("가입 성공! 로그인 하세요."); toggleBtn.click(); }
          } catch (e) { alert(e.message); }
        });
      }
      document.querySelector("#run-button").addEventListener("click", async () => {
        const resultArea = document.querySelector("#result");
        const payload = {
          user_request: document.querySelector("#user-request").value,
          destination: document.querySelector("#destination-select").value,
          origin: document.querySelector("#origin-select").value,
          days: Math.max(1, Math.ceil((new Date(document.querySelector("#end-date").value) - new Date(document.querySelector("#start-date").value)) / (1000 * 3600 * 24)) + 1),
          budget_level: document.querySelector("#budget-select").value,
          requested_features: Array.from(document.querySelectorAll('input[name="feature"]:checked')).map(c => c.value),
          additional_conditions: {
            companions: Array.from(document.querySelectorAll('input[name="companion"]:checked')).map(c => c.value),
            themes: Array.from(document.querySelectorAll('input[name="theme"]:checked')).map(c => c.value),
            priority: document.querySelector('input[name="priority"]:checked')?.value || ""
          }
        };
        resultArea.innerHTML = `<div class="loading-container"><div class="spinner"></div><p style="font-weight:900; font-size:2rem; letter-spacing:0.3em; margin-top:20px;">여정을 설계하고 있습니다...</p></div>`;
        try {
          const resp = await fetch("/run-workflow", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail);
          currentWorkflowResult = data; displayWorkflowResult(data);
          window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });
        } catch (e) { resultArea.innerHTML = `<p style="text-align:center; padding:50px; color:#e53e3e;">오류: ${e.message}</p>`; }
      });
      function displayWorkflowResult(data) {
        const area = document.querySelector("#result");
        area.innerHTML = `<h1 style="font-weight:100; font-size:6rem; margin-bottom:120px; text-transform:uppercase; letter-spacing:-0.06em; text-align:center;">${escapeHtml(data.input_data.destination)}<br/>여행 설계</h1>` +
                         data.agent_results.filter(r => !r.agent.includes("planning")).map(renderAgentResult).join("");
      }
      function escapeHtml(v) { return String(v||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
      function authHeaders(extra) { return Object.assign({ "Authorization": "Bearer " + (localStorage.getItem("onesown_token") || "") }, extra || {}); }
      function renderAgentResult(r) {
        let items = r.food_items || r.tour_items || r.event_items || r.lodging_items || [];
        const isP = r.debug_info && ((r.debug_info.companions?.length > 0) || (r.debug_info.themes?.length > 0) || r.debug_info.priority);
        const label = isP ? `<span class="customized-label">CUSTOMIZED</span>` : "";
        if (r.agent.includes("weather")) return renderWeatherCard(r, label);
        if (r.agent.includes("transport")) return renderTransportCard(r, label);
        if (r.agent.includes("budget")) return renderBudgetCard(r, label);
        if (r.agent.includes("schedule")) return renderScheduleCard(r, label);
        if (r.agent.includes("destination")) return renderDestinationCard(r, label);
        const tMap = { "FOOD": "추천 맛집", "TOUR": "관광 명소", "EVENT": "지역 행사", "LODGING": "추천 숙소" };
        const cat = r.agent.split("_")[1].toUpperCase();
        const recs = r.recommendations ? `<div style="background:#fcfcfc; padding:25px; border-radius:25px; border:1px dashed var(--line); margin-bottom:30px;">${r.recommendations.map(t => `<p style="font-size:1rem; font-weight:700;">• ${escapeHtml(t)}</p>`).join("")}</div>` : "";
        return `<article class="result-card"><h2>${tMap[cat] || cat} ${label}</h2><p class="summary-text">${escapeHtml(r.summary)}</p>${recs}<div class="circle-grid">${items.map(i => renderCircleItem(i, cat, r.destination)).join("")}</div></article>`;
      }
      function renderDestinationCard(res, label) {
        const items = (res.recommendations || []).map(x => ({ name: x.name, address: x.address, image: x.image }));
        return `<article class="result-card"><h2>추천 여행지 ${label}</h2><p class="summary-text">${escapeHtml(res.summary)}</p><div class="circle-grid">${items.map(i => renderCircleItem(i, "TOUR", res.destination)).join("")}</div></article>`;
      }
      function renderWeatherCard(res, label) {
        const html = `<div class="info-grid">${(res.daily_forecast||[]).map(d => `<div class="info-box"><p class="info-label">${escapeHtml(d.date)}</p><p class="info-value" style="font-weight:700;">${escapeHtml(d.condition)}</p><p style="font-size:0.9rem;">${escapeHtml(d.temperature)}</p></div>`).join("")}</div>`;
        return `<article class="result-card"><h2>날씨 예보 ${label}</h2><p class="summary-text">${escapeHtml(res.summary)}</p>${renderAccordion("상세 날씨 확인", html)}</article>`;
      }
      function renderTransportCard(res, label) {
        const html = `<div class="timeline-list">${(res.routes||[]).map((r, i) => `<div class="timeline-item"><div class="timeline-icon">${i+1}</div><div class="timeline-block" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;"><div><strong>${escapeHtml(r.method || r.mode)}</strong><p>${escapeHtml(r.from)} → ${escapeHtml(r.to)} (${escapeHtml(r.estimated_time)})</p></div><a href="${getTransportBookingLink(r.method || r.mode)}" target="_blank" style="display:inline-block; padding:12px 30px; background:#000; color:#fff; text-decoration:none; border-radius:99px; font-size:0.9rem; font-weight:800;">예매하기 ↗</a></div></div>`).join("")}</div>`;
        return `<article class="result-card"><h2>교통 경로 ${label}</h2><p class="summary-text">${escapeHtml(res.summary)}</p>${renderAccordion("상세 경로 보기", html)}</article>`;
      }
      function renderBudgetCard(res, label) {
        const html = `<div style="display:grid; gap:15px;">${Object.entries(res.estimated_budget||{}).filter(([k]) => k !== 'total').map(([key, val]) => `<div style="display:flex; justify-content:space-between; padding:20px 30px; border-radius:25px; background:#f9f9f9; border:1px solid #eee;"><span style="font-weight:600; text-transform:capitalize;">${escapeHtml(key)}</span><span style="color:var(--text); font-weight:700;">${escapeHtml(val)}</span></div>`).join("")}</div>`;
        return `<article class="result-card"><h2>여행 예산 <span style="font-size:1rem; font-weight:700; opacity:0.5;">(1인 기준)</span> ${label}</h2><p class="summary-text" style="color:#000; font-weight:700;">${escapeHtml(res.summary)}</p><div style="font-size:3rem; font-weight:900; margin-bottom:5px;">${escapeHtml(res.total)}</div><p style="font-size:0.8rem; color:var(--muted); margin-bottom:40px;">※ 1인 기준 추정 경비입니다 (숙박은 1실 기준).</p>${renderAccordion("상세 예산 내역", html)}</article>`;
      }
      function renderScheduleCard(res, label) {
        const html = `<div class="itinerary-grid">${(res.daily_itinerary||[]).map(day => `<div class="day-card"><div class="day-card-header"><h3>Day ${day.day}</h3><p>${escapeHtml(day.title)}</p></div><details class="details-accordion day-accordion" open><summary>일정 상세보기</summary><div class="details-content"><div class="timeline-list" style="padding-left:35px;">${(day.time_blocks||[]).map(b => `<div class="timeline-item"><div class="timeline-icon" style="width:30px; height:30px; left:-40px; font-size:0.6rem;">${b.time.slice(0,2)}</div><div class="timeline-block" style="padding:18px 25px; border-radius:25px;"><strong style="font-size:1.1rem;">${escapeHtml(b.title)}</strong><p style="margin-top:5px;">${escapeHtml(b.description || b.memo)}</p></div></div>`).join("")}</div></div></details></div>`).join("")}</div>`;
        return `<article class="result-card"><h2>추천 일정 ${label}</h2><p class="summary-text">${escapeHtml(res.summary)}</p>${html}</article>`;
      }
      function renderCircleItem(item, cat, dest) {
        const title = item.name || item.title || "정보 없음"; const addr = item.address || item.addr1 || "정보 없음";
        const img = item.image ? `<img src="${encodeURI(item.image)}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" />` : "";
        const fallback = `<div style="display:${item.image ? 'none' : 'grid'}; place-items:center; height:100%; color:#eee; font-size:0.6rem; font-weight:900; background:#fafafa;">NO IMAGE</div>`;
        let url = `https://map.naver.com/v5/search/${encodeURIComponent(title)}`;
        if (cat === "STAY" || cat === "LODGING") url = `https://www.agoda.com/ko-kr/search?text=${encodeURIComponent(dest + " " + title)}`;
        return `<div class="circle-item"><a href="${url}" target="_blank" style="text-decoration:none; color:inherit;"><div class="circle-mask" style="position:relative;">${img}${fallback}</div><div class="item-title">${escapeHtml(title)}</div><div class="item-meta">${escapeHtml(addr)}</div></a><a href="https://www.google.com/search?q=${encodeURIComponent(dest + " " + title + " 후기")}" target="_blank" style="font-size:0.65rem; color:var(--muted); text-decoration:underline; display:block; margin-top:8px;">리뷰 보기</a></div>`;
      }
      function getTransportBookingLink(method) {
        const m = String(method||"").toUpperCase();
        if (m.includes("KTX") || m.includes("기차")) return "https://www.letskorail.com/";
        if (m.includes("고속") || m.includes("버스")) return "https://www.kobus.co.kr/";
        if (m.includes("항공") || m.includes("FLIGHT")) return "https://flight.naver.com/";
        if (m.includes("선박") || m.includes("SHIP")) return "https://island.haewoon.co.kr/";
        return "https://map.naver.com/";
      }
      function renderAccordion(title, html) { return `<details class="details-accordion"><summary>${title}</summary><div class="details-content">${html}</div></details>`; }
      async function saveCurrentPlan() {
        if (!currentWorkflowResult || !currentUser) return alert("설계 결과가 없거나 로그인 안됨");
        const title = prompt("제목:", `${currentWorkflowResult.input_data.destination} 여행`); if (!title) return;
        const resp = await fetch(`/api/plans`, { method: "POST", headers: authHeaders({ "Content-Type": "application/json" }), body: JSON.stringify({ title, destination: currentWorkflowResult.input_data.destination, content_json: currentWorkflowResult }) });
        if (resp.ok) { alert("저장됨"); renderSavedPlans(); }
      }
      async function renderSavedPlans() {
        const list = document.querySelector("#saved-plan-list"); if (!savedPlansExpanded || !currentUser) { list.innerHTML = ""; return; }
        const resp = await fetch(`/api/plans`, { headers: authHeaders() }); const plans = await resp.json();
        list.innerHTML = `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:25px; margin-top:40px;">${plans.map(p => `<div class="timeline-block" style="text-align:left;"><div style="cursor:pointer;" onclick='loadSavedPlanData(${JSON.stringify(p.content_json).replace(/'/g, "&apos;")})'><p style="font-size:0.75rem; font-weight:900; opacity:0.3;">${new Date(p.created_at).toLocaleDateString()}</p><strong>${escapeHtml(p.title)}</strong></div><div class="plan-controls"><button class="control-btn edit" onclick="renamePlan('${p.id}', '${escapeHtml(p.title).replace(/'/g, "&#39;")}')">수정</button><button class="control-btn delete" onclick="deletePlan('${p.id}')">삭제</button></div></div>`).join("")}</div>`;
      }
      async function renamePlan(id, currentTitle) {
        const title = prompt("새 제목:", currentTitle); if (title === null || !title.trim()) return;
        const resp = await fetch(`/api/plans/${id}`, { method: "PATCH", headers: authHeaders({ "Content-Type": "application/json" }), body: JSON.stringify({ title: title.trim() }) });
        if (resp.ok) { renderSavedPlans(); } else { alert("수정 실패"); }
      }
      function loadSavedPlanData(data) { currentWorkflowResult = data; displayWorkflowResult(data); window.scrollTo({ top: document.querySelector("#result").offsetTop - 50, behavior: 'smooth' }); }
      async function deletePlan(id) { if (confirm("삭제?")) { await fetch(`/api/plans/${id}`, { method: "DELETE", headers: authHeaders() }); renderSavedPlans(); } }
      function initTabs() { document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); btn.classList.add('active'); document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active'); }); }); }
      function initRating() {
        let cur = 0; const stars = document.querySelectorAll(".star-btn");
        stars.forEach(s => { s.addEventListener("click", () => { cur = parseInt(s.dataset.value); stars.forEach(b => { b.textContent = parseInt(b.dataset.value) <= cur ? "●" : "○"; b.classList.toggle("active", parseInt(b.dataset.value) <= cur); }); }); });
        document.querySelector("#submit-rating").addEventListener("click", async () => { if (cur > 0) { await fetch("/ratings", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ score: cur, comment: document.querySelector("#rating-comment").value }) }); alert("완료"); loadRatings(); } });
        document.querySelector("#submit-comment").addEventListener("click", async () => { if (document.querySelector("#comment-content").value) { await fetch("/comments", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ user_name: document.querySelector("#comment-user").value || "익명", content: document.querySelector("#comment-content").value }) }); document.querySelector("#comment-content").value = ""; loadComments(); } });
      }
      async function loadComments() { const resp = await fetch("/comments"); const data = await resp.json(); document.querySelector("#comment-list").innerHTML = data.reverse().map(c => `<div class="comment-item"><strong>${escapeHtml(c.user_name)}</strong><p style="margin-top:8px;">${escapeHtml(c.content)}</p></div>`).join(""); }
      async function loadRatings() { const resp = await fetch("/ratings"); const data = await resp.json(); document.querySelector("#average-rating").innerHTML = `평균 별점: ● ${data.average} (${data.count}명 참여)`; }
      async function runRecommend() {
        const budget = parseInt(document.querySelector("#rec-budget").value) || 0;
        const people = parseInt(document.querySelector("#rec-people").value) || 1;
        const days = parseInt(document.querySelector("#rec-days").value) || 1;
        if (!budget) return alert("총 예산을 입력하세요.");
        const themes = Array.from(document.querySelectorAll('input[name="rec-theme"]:checked')).map(c => c.value);
        const box = document.querySelector("#rec-result");
        box.innerHTML = `<p style="text-align:center; padding:30px;">추천 중...</p>`;
        try {
          const resp = await fetch("/recommend", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ budget_total: budget, people, days, themes }) });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || "추천 실패");
          renderRecommendations(data.recommendations || [], { people, days, themes });
        } catch (e) { box.innerHTML = `<p style="text-align:center; color:#e53e3e; padding:30px;">오류: ${escapeHtml(e.message)}</p>`; }
      }
      function renderRecommendations(recs, ctx) {
        const box = document.querySelector("#rec-result");
        if (!recs.length) { box.innerHTML = `<p style="text-align:center; padding:30px;">추천 결과가 없습니다.</p>`; return; }
        box.innerHTML = `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top:30px;">${recs.map(r => `
          <div class="timeline-block" style="text-align:left; ${r.within_budget ? "" : "opacity:0.55;"}">
            <strong style="font-size:1.2rem;">${escapeHtml(r.destination)}</strong>
            <p style="margin:8px 0; font-weight:800;">${escapeHtml(r.est_total)} ${r.within_budget ? `· ${escapeHtml(r.affordable_level || "")}` : "· 예산 초과"}</p>
            <p style="font-size:0.85rem; color:var(--muted); margin-bottom:12px;">${escapeHtml(r.reason)}</p>
            <button class="nav-btn" style="height:42px; padding:0 22px;" onclick='exploreRecommendation(${JSON.stringify({ destination: r.destination, days: ctx.days, themes: ctx.themes }).replace(/'/g, "&#39;")})'>이 여정 자세히 보기</button>
          </div>`).join("")}</div>`;
      }
      function exploreRecommendation(sel) {
        document.querySelector("#destination-select").value = sel.destination;
        document.querySelector("#run-button").click();
      }
      document.querySelector("#rec-button").addEventListener("click", runRecommend);
      document.querySelector("#save-plan-button").addEventListener("click", saveCurrentPlan);
      document.querySelector("#toggle-saved-plans-button").addEventListener("click", () => { savedPlansExpanded = !savedPlansExpanded; document.querySelector("#toggle-saved-plans-button").textContent = savedPlansExpanded ? "보관함 닫기" : "보관함 열기"; renderSavedPlans(); });
    </script>
  </body>
</html>
